[project]
name = "agentcloud-sdk"
version = "0.1.0"
description = "Python SDK for Agent Cloud Drive - cloud memory sync for AI agents"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
authors = [
    {name = "Agent Cloud", email = "dev@agentcloud.dev"}
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
    "sqlalchemy>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["agentcloud*"]