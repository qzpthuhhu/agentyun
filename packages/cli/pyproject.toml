[project]
name = "agentcloud"
version = "0.1.0"
description = "CLI for AgentCloud - key-based cloud memory for AI agents"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
authors = [
    {name = "Agent Cloud", email = "dev@agentcloud.dev"}
]
dependencies = [
    "agentcloud-sdk",
    "click>=8.1.0",
    "rich>=13.0.0",
]

[project.scripts]
agentcloud = "agentcloud_cli.__main__:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["agentcloud_cli*"]