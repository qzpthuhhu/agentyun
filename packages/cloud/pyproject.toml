[project]
name = "agentcloud-cloud"
version = "0.1.0"
description = "Cloud backend for Agent Cloud Drive"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
authors = [
    {name = "Agent Cloud", email = "dev@agentcloud.dev"}
]
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.23.0",
    "sqlalchemy>=2.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-multipart>=0.0.6",
    "bcrypt>=4.0.0",
    "python-jose[cryptography]>=3.3.0",
    "base58>=2.1.0",
    "sentence-transformers>=2.2.0",
    "numpy>=1.24.0",
    "jinja2>=3.1.0",
    "sqlite-vec>=0.1.0",
    "pgvector>=0.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "httpx>=0.25.0",
    "pytest-asyncio>=0.21",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]